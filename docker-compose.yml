services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docmind
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmind -d docmind"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Deep Bleue IA DocMind}
      APP_ENV: ${APP_ENV:-dev}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      # Infrastructure URLs use Docker-internal hostnames — do not substitute.
      DATABASE_URL: postgresql+asyncpg://docmind:docmind@postgres:5432/docmind
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      # All other settings come from .env on the host (with safe defaults).
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-docmind_chunks}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-deep-bleue-ia}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      LOCAL_CONNECTOR_ROOT: ${LOCAL_CONNECTOR_ROOT:-/data}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      RAG_MAX_CONTEXT_CHARS: ${RAG_MAX_CONTEXT_CHARS:-12000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./sample_docs:/data/local-docs:ro
      - upload_data:/data/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_TENANT_ID: deep-bleue-ia
      NEXT_PUBLIC_USER_ID: alice
      NEXT_PUBLIC_USER_EMAIL: alice@deepbleue.ai
      NEXT_PUBLIC_USER_GROUPS: everyone,finance,direction
      NEXT_PUBLIC_DEFAULT_LOCAL_ROOT: /data/local-docs
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  upload_data:
